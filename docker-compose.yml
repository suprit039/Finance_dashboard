version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=finance_db
      - DB_USER=postgres
      - DB_PASS=suprit123
      - JWT_SECRET=2001a10e51dcc5625af6228f0f97ef5c89e16d06be5b21510d009e1ffc4cbb7d
      - JWT_EXPIRES_IN=1d
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/usr/src/app/src
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: finance_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=finance_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=suprit123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: finance_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
